name: Build APK
on:
  repository_dispatch:
    types: [build-apk]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: echo ok > output.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: output.apk
          retention-days: 1