name: Build APK
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'url or zip'
        required: true
        default: 'url'
      url:
        description: 'Website URL'
        required: false
      app_name:
        description: 'App Name'
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_URL: ${{ github.event.inputs.url }}
      APP_NAME: ${{ github.event.inputs.app_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Accept licenses & install tools
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "build-tools;34.0.0" "platforms;android-34" || true

      - name: Create WebView project
        if: github.event.inputs.build_type == 'url'
        run: |
          node -e "
            var fs=require('fs');
            var url=process.env.APP_URL||'';
            var name=process.env.APP_NAME||'App';
            var pkg='com.apkbot.'+name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,20);
            fs.mkdirSync('webview-app/app/src/main/java/com/apkbot/app',{recursive:true});
            fs.mkdirSync('webview-app/app/src/main/res/values',{recursive:true});
            fs.mkdirSync('webview-app/gradle/wrapper',{recursive:true});
            fs.writeFileSync('webview-app/settings.gradle','rootProject.name = \x22WebViewApp\x22\ninclude \x22:app\x22\n');
            fs.writeFileSync('webview-app/build.gradle','buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath \x22com.android.tools.build:gradle:8.2.2\x22 }\n}\nallprojects { repositories { google(); mavenCentral() } }\n');
            fs.writeFileSync('webview-app/gradle.properties','android.useAndroidX=true\norg.gradle.daemon=false\n');
            fs.writeFileSync('webview-app/gradle/wrapper/gradle-wrapper.properties','distributionUrl=https\\\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n');
            var appBg='plugins { id \x22com.android.application\x22 }\nandroid {\n  namespace \x22'+pkg+'\x22\n  compileSdk 34\n  defaultConfig {\n    applicationId \x22'+pkg+'\x22\n    minSdk 21; targetSdk 34\n    versionCode 1; versionName \x221.0\x22\n  }\n  buildTypes { release { minifyEnabled false; signingConfig signingConfigs.debug } }\n  compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }\n}\ndependencies { implementation \x22androidx.appcompat:appcompat:1.6.1\x22 }\n';
            fs.writeFileSync('webview-app/app/build.gradle',appBg);
            var mf='<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n<manifest xmlns:android=\x22http://schemas.android.com/apk/res/android\x22>\n  <uses-permission android:name=\x22android.permission.INTERNET\x22/>\n  <uses-permission android:name=\x22android.permission.ACCESS_NETWORK_STATE\x22/>\n  <application android:allowBackup=\x22true\x22 android:label=\x22'+name+'\x22 android:usesCleartextTraffic=\x22true\x22 android:theme=\x22@style/Theme.AppCompat.NoActionBar\x22>\n    <activity android:name=\x22.MainActivity\x22 android:exported=\x22true\x22 android:configChanges=\x22orientation|screenSize\x22>\n      <intent-filter>\n        <action android:name=\x22android.intent.action.MAIN\x22/>\n        <category android:name=\x22android.intent.category.LAUNCHER\x22/>\n      </intent-filter>\n    </activity>\n  </application>\n</manifest>\n';
            fs.writeFileSync('webview-app/app/src/main/AndroidManifest.xml',mf);
            var java='package com.apkbot.app;\nimport android.annotation.SuppressLint;\nimport android.graphics.Color;\nimport android.os.Bundle;\nimport android.view.Gravity;\nimport android.view.View;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\nimport android.widget.LinearLayout;\nimport android.widget.ProgressBar;\nimport android.widget.RelativeLayout;\nimport android.widget.TextView;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {\n  private WebView wv;\n  @SuppressLint(\x22SetJavaScriptEnabled\x22)\n  @Override protected void onCreate(Bundle b) {\n    super.onCreate(b);\n    RelativeLayout root = new RelativeLayout(this);\n    LinearLayout sl = new LinearLayout(this);\n    sl.setOrientation(LinearLayout.VERTICAL);\n    sl.setGravity(Gravity.CENTER);\n    sl.setBackgroundColor(Color.parseColor(\x22#1a1a2e\x22));\n    sl.setLayoutParams(new RelativeLayout.LayoutParams(-1,-1));\n    TextView tv = new TextView(this);\n    tv.setText(\x22'+name+'\x22);\n    tv.setTextSize(28f);\n    tv.setTextColor(Color.WHITE);\n    tv.setGravity(Gravity.CENTER);\n    tv.setPadding(32,0,32,60);\n    ProgressBar pb = new ProgressBar(this);\n    sl.addView(tv); sl.addView(pb);\n    wv = new WebView(this);\n    wv.setLayoutParams(new RelativeLayout.LayoutParams(-1,-1));\n    wv.setVisibility(View.INVISIBLE);\n    WebSettings s = wv.getSettings();\n    s.setJavaScriptEnabled(true); s.setDomStorageEnabled(true);\n    s.setLoadWithOverviewMode(true); s.setUseWideViewPort(true);\n    wv.setWebViewClient(new WebViewClient() {\n      private void show() { wv.setVisibility(View.VISIBLE); sl.setVisibility(View.GONE); }\n      @Override public void onPageFinished(WebView v, String u) { super.onPageFinished(v,u); show(); }\n      @SuppressWarnings(\x22deprecation\x22) @Override public void onReceivedError(WebView v, int c, String d, String f) { super.onReceivedError(v,c,d,f); show(); }\n    });\n    new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(new Runnable(){public void run(){if(sl.getVisibility()==View.VISIBLE){wv.setVisibility(View.VISIBLE);sl.setVisibility(View.GONE);}}},10000);\n    wv.loadUrl(\x22'+url+'\x22);\n    root.addView(wv); root.addView(sl);\n    setContentView(root);\n  }\n  @Override public void onBackPressed() { if (wv.canGoBack()) wv.goBack(); else super.onBackPressed(); }\n}\n';
            fs.writeFileSync('webview-app/app/src/main/java/com/apkbot/app/MainActivity.java',java);
            fs.writeFileSync('webview-app/app/src/main/res/values/strings.xml','<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n<resources><string name=\x22app_name\x22>'+name+'</string></resources>\n');
            console.log('Project created: '+name+' ('+pkg+')');
          "

      - name: Build URL APK
        if: github.event.inputs.build_type == 'url'
        working-directory: webview-app
        run: |
          gradle wrapper && chmod +x gradlew
          ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
          find . -name "*.apk" -exec cp {} ../output.apk \;

      - name: Extract ZIP
        if: github.event.inputs.build_type == 'zip'
        run: |
          [ -f "upload.zip" ] || (echo "upload.zip missing!" && exit 1)
          unzip -o upload.zip -d zip-project

      - name: Build ZIP project
        if: github.event.inputs.build_type == 'zip'
        run: |
          echo "=== ZIP contents (top 50) ==="
          find zip-project -maxdepth 3 -not -path "*/node_modules/*" | head -50
          echo "=============================="
          FLUTTER_DIR=$(find zip-project -name "pubspec.yaml" ! -path "*/node_modules/*" | head -1 | xargs dirname 2>/dev/null || echo "")
          GRADLE_WRAP=$(find zip-project -name "gradlew" ! -path "*/node_modules/*" | head -1 | xargs dirname 2>/dev/null || echo "")
          GRADLE_BUILD=$(find zip-project \( -name "settings.gradle" -o -name "settings.gradle.kts" \) ! -path "*/node_modules/*" | head -1 | xargs dirname 2>/dev/null || echo "")
          NODE_DIR=$(find zip-project -name "package.json" ! -path "*/node_modules/*" | head -1 | xargs dirname 2>/dev/null || echo "")
          HTML_DIR=$(find zip-project -name "index.html" ! -path "*/node_modules/*" ! -path "*/__pycache__/*" | head -1 | xargs dirname 2>/dev/null || echo "")
          if [ -n "$FLUTTER_DIR" ]; then
            echo ">>> Flutter project: $FLUTTER_DIR"
            sudo snap install flutter --classic 2>/dev/null || true
            export PATH="$HOME/snap/flutter/common/flutter/bin:$PATH"
            cd "$FLUTTER_DIR"
            flutter pub get && flutter build apk --release --no-tree-shake-icons
            find . -name "*.apk" | head -1 | xargs -I{} cp {} $GITHUB_WORKSPACE/output.apk
          elif [ -n "$GRADLE_WRAP" ]; then
            echo ">>> Android project (with wrapper): $GRADLE_WRAP"
            cd "$GRADLE_WRAP" && chmod +x gradlew
            ./gradlew assembleRelease --no-daemon 2>&1 | tail -80
            find . -name "*.apk" | head -1 | xargs -I{} cp {} $GITHUB_WORKSPACE/output.apk
          elif [ -n "$GRADLE_BUILD" ]; then
            echo ">>> Android project (no wrapper): $GRADLE_BUILD"
            cd "$GRADLE_BUILD"
            gradle wrapper --gradle-version 8.4
            chmod +x gradlew
            ./gradlew assembleRelease --no-daemon 2>&1 | tail -80
            find . -name "*.apk" | head -1 | xargs -I{} cp {} $GITHUB_WORKSPACE/output.apk
          elif [ -n "$NODE_DIR" ]; then
            echo ">>> Node.js project: $NODE_DIR"
            cd "$NODE_DIR"
            IS_FRONTEND=$(node -e "try{const p=require('./package.json');const all=Object.keys({...p.dependencies||{},...p.devDependencies||{}});const fe=['react','vue','vite','next','nuxt','svelte','@angular/core','gatsby','remix'];console.log(fe.some(f=>all.includes(f))?'yes':'no')}catch(e){console.log('no')}")
            IS_VUE=$([ -f "vue.config.js" ] || [ -f "vue.config.ts" ] && echo "yes" || echo "no")
            IS_VITE=$([ -f "vite.config.js" ] || [ -f "vite.config.ts" ] || [ -f "vite.config.mjs" ] && echo "yes" || echo "no")
            IS_NEXT=$([ -f "next.config.js" ] || [ -f "next.config.ts" ] || [ -f "next.config.mjs" ] && echo "yes" || echo "no")
            echo "Frontend: $IS_FRONTEND | Vue: $IS_VUE | Vite: $IS_VITE | Next: $IS_NEXT"
            echo "Installing dependencies..."
            npm install --legacy-peer-deps 2>&1 | tail -15 || true
            HAS_BUILD=$(node -e "try{const p=require('./package.json');console.log(p.scripts&&p.scripts.build?'yes':'no')}catch(e){console.log('no')}")
            BUILD_OK="no"
            if [ "$HAS_BUILD" = "yes" ]; then
              echo ">>> Running npm run build..."
              NODE_OPTIONS="--max-old-space-size=4096" npm run build 2>&1 | tee /tmp/build_out.log | tail -60
              BUILD_EXIT=${PIPESTATUS[0]}
              echo "Build exit code: $BUILD_EXIT"
              [ "$BUILD_EXIT" = "0" ] && BUILD_OK="yes" || echo "npm run build exited $BUILD_EXIT, trying fallbacks..."
              cat /tmp/build_out.log | grep -i "error|warn|fail" | tail -10 || true
            fi
            if [ "$BUILD_OK" = "no" ] && [ "$IS_VUE" = "yes" ]; then
              echo ">>> Vue fallback: npx @vue/cli-service build..."
              NODE_OPTIONS="--max-old-space-size=4096" npx --yes @vue/cli-service build 2>&1 | tail -40 || true
              BUILD_OK="maybe"
            fi
            if [ "$BUILD_OK" = "no" ] && [ "$IS_VITE" = "yes" ]; then
              echo ">>> Vite fallback: npx vite build..."
              NODE_OPTIONS="--max-old-space-size=4096" npx --yes vite build 2>&1 | tail -40 || true
              BUILD_OK="maybe"
            fi
            if [ "$IS_NEXT" = "yes" ]; then
              echo ">>> Next.js: trying export..."
              npm run export 2>/dev/null | tail -20 || npx --yes next export 2>/dev/null | tail -20 || true
            fi
            echo "=== Locating output index.html ==="
            find . -name "index.html" ! -path "*/node_modules/*" ! -path "./src/*" ! -path "./public/src/*" 2>/dev/null | head -20
            STATIC=""
            for d in build dist out .next/out www static _site .output/public dist/public web; do
              if [ -d "$d" ] && [ -f "$d/index.html" ]; then STATIC="$d"; break; fi
            done
            if [ -z "$STATIC" ] && [ -f "public/index.html" ]; then STATIC="public"; fi
            if [ -z "$STATIC" ] && [ -f "index.html" ]; then STATIC="."; fi
            if [ -z "$STATIC" ]; then
              FOUND=$(find . -name "index.html" ! -path "*/node_modules/*" ! -path "./src/*" ! -path "./public/src/*" 2>/dev/null | head -1)
              [ -n "$FOUND" ] && STATIC=$(dirname "$FOUND")
            fi
            if [ -z "$STATIC" ]; then
              if [ "$IS_FRONTEND" = "yes" ] || [ "$IS_VUE" = "yes" ] || [ "$IS_VITE" = "yes" ]; then
                echo "##[error]Projek React/Vue/Vite/Next.js gagal build atau output folder tidak dijumpai."
                echo "##[error]Pastikan 'npm run build' berfungsi dan output ada dalam: build/, dist/, atau out/"
                echo "##[error]Semak package.json → scripts.build anda."
              else
                echo "##[error]ZIP ini adalah projek backend Node.js (tiada HTML output)."
                echo "##[error]Untuk buat APK dari website, gunakan MODE URL bukan ZIP."
                echo "##[error]ZIP mode hanya untuk: Flutter, Android Studio, React/Vue/Vite, atau HTML."
              fi
              exit 1
            fi
            echo ">>> Wrapping static web ($STATIC) sebagai WebView APK..."
            cd "$GITHUB_WORKSPACE"
            APPNAME="${APP_NAME:-App}"
            PKG="com.apkbot.$(echo $APPNAME | tr '[:upper:]' '[:lower:]' | tr -cd 'a-z0-9' | cut -c1-20)"
            node -e "
              var fs=require('fs');
              var name=process.env.APP_NAME||'App';
              var pkg='com.apkbot.'+name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,20);
              fs.mkdirSync('webview-app/app/src/main/java/com/apkbot/app',{recursive:true});
              fs.mkdirSync('webview-app/app/src/main/res/values',{recursive:true});
              fs.mkdirSync('webview-app/app/src/main/assets/www',{recursive:true});
              fs.mkdirSync('webview-app/gradle/wrapper',{recursive:true});
              fs.writeFileSync('webview-app/settings.gradle','rootProject.name = \x22WebViewApp\x22\ninclude \x22:app\x22\n');
              fs.writeFileSync('webview-app/build.gradle','buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath \x22com.android.tools.build:gradle:8.2.2\x22 }\n}\nallprojects { repositories { google(); mavenCentral() } }\n');
              fs.writeFileSync('webview-app/gradle.properties','android.useAndroidX=true\norg.gradle.daemon=false\n');
              fs.writeFileSync('webview-app/gradle/wrapper/gradle-wrapper.properties','distributionUrl=https\\\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n');
              var appBg='plugins { id \x22com.android.application\x22 }\nandroid {\n  namespace \x22'+pkg+'\x22\n  compileSdk 34\n  defaultConfig {\n    applicationId \x22'+pkg+'\x22\n    minSdk 21; targetSdk 34\n    versionCode 1; versionName \x221.0\x22\n  }\n  buildTypes { release { minifyEnabled false; signingConfig signingConfigs.debug } }\n  compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }\n}\ndependencies { implementation \x22androidx.appcompat:appcompat:1.6.1\x22 }\n';
              fs.writeFileSync('webview-app/app/build.gradle',appBg);
              var mf='<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n<manifest xmlns:android=\x22http://schemas.android.com/apk/res/android\x22>\n  <uses-permission android:name=\x22android.permission.INTERNET\x22/>\n  <uses-permission android:name=\x22android.permission.ACCESS_NETWORK_STATE\x22/>\n  <application android:allowBackup=\x22true\x22 android:label=\x22'+name+'\x22 android:usesCleartextTraffic=\x22true\x22 android:theme=\x22@style/Theme.AppCompat.NoActionBar\x22>\n    <activity android:name=\x22.MainActivity\x22 android:exported=\x22true\x22 android:configChanges=\x22orientation|screenSize\x22>\n      <intent-filter>\n        <action android:name=\x22android.intent.action.MAIN\x22/>\n        <category android:name=\x22android.intent.category.LAUNCHER\x22/>\n      </intent-filter>\n    </activity>\n  </application>\n</manifest>\n';
              fs.writeFileSync('webview-app/app/src/main/AndroidManifest.xml',mf);
              var java='package com.apkbot.app;\nimport android.annotation.SuppressLint;\nimport android.graphics.Color;\nimport android.os.Bundle;\nimport android.view.Gravity;\nimport android.view.View;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\nimport android.widget.LinearLayout;\nimport android.widget.ProgressBar;\nimport android.widget.RelativeLayout;\nimport android.widget.TextView;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {\n  private WebView wv;\n  @SuppressLint(\x22SetJavaScriptEnabled\x22)\n  @Override protected void onCreate(Bundle b) {\n    super.onCreate(b);\n    RelativeLayout root = new RelativeLayout(this);\n    LinearLayout sl = new LinearLayout(this);\n    sl.setOrientation(LinearLayout.VERTICAL);\n    sl.setGravity(Gravity.CENTER);\n    sl.setBackgroundColor(Color.parseColor(\x22#1a1a2e\x22));\n    sl.setLayoutParams(new RelativeLayout.LayoutParams(-1,-1));\n    TextView tv = new TextView(this);\n    tv.setText(\x22'+name+'\x22);\n    tv.setTextSize(28f);\n    tv.setTextColor(Color.WHITE);\n    tv.setGravity(Gravity.CENTER);\n    tv.setPadding(32,0,32,60);\n    ProgressBar pb = new ProgressBar(this);\n    sl.addView(tv); sl.addView(pb);\n    wv = new WebView(this);\n    wv.setLayoutParams(new RelativeLayout.LayoutParams(-1,-1));\n    wv.setVisibility(View.INVISIBLE);\n    WebSettings s = wv.getSettings();\n    s.setJavaScriptEnabled(true); s.setDomStorageEnabled(true);\n    s.setLoadWithOverviewMode(true); s.setUseWideViewPort(true);\n    wv.setWebViewClient(new WebViewClient() {\n      private void show() { wv.setVisibility(View.VISIBLE); sl.setVisibility(View.GONE); }\n      @Override public void onPageFinished(WebView v, String u) { super.onPageFinished(v,u); show(); }\n      @SuppressWarnings(\x22deprecation\x22) @Override public void onReceivedError(WebView v, int c, String d, String f) { super.onReceivedError(v,c,d,f); show(); }\n    });\n    new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(new Runnable(){public void run(){if(sl.getVisibility()==View.VISIBLE){wv.setVisibility(View.VISIBLE);sl.setVisibility(View.GONE);}}},10000);\n    wv.loadUrl(\x22file:///android_asset/www/index.html\x22);\n    root.addView(wv); root.addView(sl);\n    setContentView(root);\n  }\n  @Override public void onBackPressed() { if (wv.canGoBack()) wv.goBack(); else super.onBackPressed(); }\n}\n';
              fs.writeFileSync('webview-app/app/src/main/java/com/apkbot/app/MainActivity.java',java);
              fs.writeFileSync('webview-app/app/src/main/res/values/strings.xml','<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n<resources><string name=\x22app_name\x22>'+name+'</string></resources>\n');
            "
            cp -r "$NODE_DIR/$STATIC/." webview-app/app/src/main/assets/www/
            echo "Static files copied to assets/www/"
            ls webview-app/app/src/main/assets/www/ | head -10
            cd webview-app
            gradle wrapper && chmod +x gradlew
            ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
            find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output.apk \;
          elif [ -n "$HTML_DIR" ]; then
            echo ">>> Static HTML site: $HTML_DIR"
            cd "$GITHUB_WORKSPACE"
            APPNAME="${APP_NAME:-App}"
            node -e "
              var fs=require('fs');
              var name=process.env.APP_NAME||'App';
              var pkg='com.apkbot.'+name.toLowerCase().replace(/[^a-z0-9]/g,'').slice(0,20);
              fs.mkdirSync('webview-app/app/src/main/java/com/apkbot/app',{recursive:true});
              fs.mkdirSync('webview-app/app/src/main/res/values',{recursive:true});
              fs.mkdirSync('webview-app/app/src/main/assets/www',{recursive:true});
              fs.mkdirSync('webview-app/gradle/wrapper',{recursive:true});
              fs.writeFileSync('webview-app/settings.gradle','rootProject.name = \x22WebViewApp\x22\ninclude \x22:app\x22\n');
              fs.writeFileSync('webview-app/build.gradle','buildscript {\n  repositories { google(); mavenCentral() }\n  dependencies { classpath \x22com.android.tools.build:gradle:8.2.2\x22 }\n}\nallprojects { repositories { google(); mavenCentral() } }\n');
              fs.writeFileSync('webview-app/gradle.properties','android.useAndroidX=true\norg.gradle.daemon=false\n');
              fs.writeFileSync('webview-app/gradle/wrapper/gradle-wrapper.properties','distributionUrl=https\\\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n');
              var appBg='plugins { id \x22com.android.application\x22 }\nandroid {\n  namespace \x22'+pkg+'\x22\n  compileSdk 34\n  defaultConfig {\n    applicationId \x22'+pkg+'\x22\n    minSdk 21; targetSdk 34\n    versionCode 1; versionName \x221.0\x22\n  }\n  buildTypes { release { minifyEnabled false; signingConfig signingConfigs.debug } }\n  compileOptions { sourceCompatibility JavaVersion.VERSION_17; targetCompatibility JavaVersion.VERSION_17 }\n}\ndependencies { implementation \x22androidx.appcompat:appcompat:1.6.1\x22 }\n';
              fs.writeFileSync('webview-app/app/build.gradle',appBg);
              var mf='<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n<manifest xmlns:android=\x22http://schemas.android.com/apk/res/android\x22>\n  <uses-permission android:name=\x22android.permission.INTERNET\x22/>\n  <uses-permission android:name=\x22android.permission.ACCESS_NETWORK_STATE\x22/>\n  <application android:allowBackup=\x22true\x22 android:label=\x22'+name+'\x22 android:usesCleartextTraffic=\x22true\x22 android:theme=\x22@style/Theme.AppCompat.NoActionBar\x22>\n    <activity android:name=\x22.MainActivity\x22 android:exported=\x22true\x22 android:configChanges=\x22orientation|screenSize\x22>\n      <intent-filter>\n        <action android:name=\x22android.intent.action.MAIN\x22/>\n        <category android:name=\x22android.intent.category.LAUNCHER\x22/>\n      </intent-filter>\n    </activity>\n  </application>\n</manifest>\n';
              fs.writeFileSync('webview-app/app/src/main/AndroidManifest.xml',mf);
              var java='package com.apkbot.app;\nimport android.annotation.SuppressLint;\nimport android.graphics.Color;\nimport android.os.Bundle;\nimport android.view.Gravity;\nimport android.view.View;\nimport android.webkit.WebSettings;\nimport android.webkit.WebView;\nimport android.webkit.WebViewClient;\nimport android.widget.LinearLayout;\nimport android.widget.ProgressBar;\nimport android.widget.RelativeLayout;\nimport android.widget.TextView;\nimport androidx.appcompat.app.AppCompatActivity;\npublic class MainActivity extends AppCompatActivity {\n  private WebView wv;\n  @SuppressLint(\x22SetJavaScriptEnabled\x22)\n  @Override protected void onCreate(Bundle b) {\n    super.onCreate(b);\n    RelativeLayout root = new RelativeLayout(this);\n    LinearLayout sl = new LinearLayout(this);\n    sl.setOrientation(LinearLayout.VERTICAL);\n    sl.setGravity(Gravity.CENTER);\n    sl.setBackgroundColor(Color.parseColor(\x22#1a1a2e\x22));\n    sl.setLayoutParams(new RelativeLayout.LayoutParams(-1,-1));\n    TextView tv = new TextView(this);\n    tv.setText(\x22'+name+'\x22);\n    tv.setTextSize(28f);\n    tv.setTextColor(Color.WHITE);\n    tv.setGravity(Gravity.CENTER);\n    tv.setPadding(32,0,32,60);\n    ProgressBar pb = new ProgressBar(this);\n    sl.addView(tv); sl.addView(pb);\n    wv = new WebView(this);\n    wv.setLayoutParams(new RelativeLayout.LayoutParams(-1,-1));\n    wv.setVisibility(View.INVISIBLE);\n    WebSettings s = wv.getSettings();\n    s.setJavaScriptEnabled(true); s.setDomStorageEnabled(true);\n    s.setLoadWithOverviewMode(true); s.setUseWideViewPort(true);\n    wv.setWebViewClient(new WebViewClient() {\n      private void show() { wv.setVisibility(View.VISIBLE); sl.setVisibility(View.GONE); }\n      @Override public void onPageFinished(WebView v, String u) { super.onPageFinished(v,u); show(); }\n      @SuppressWarnings(\x22deprecation\x22) @Override public void onReceivedError(WebView v, int c, String d, String f) { super.onReceivedError(v,c,d,f); show(); }\n    });\n    new android.os.Handler(android.os.Looper.getMainLooper()).postDelayed(new Runnable(){public void run(){if(sl.getVisibility()==View.VISIBLE){wv.setVisibility(View.VISIBLE);sl.setVisibility(View.GONE);}}},10000);\n    wv.loadUrl(\x22file:///android_asset/www/index.html\x22);\n    root.addView(wv); root.addView(sl);\n    setContentView(root);\n  }\n  @Override public void onBackPressed() { if (wv.canGoBack()) wv.goBack(); else super.onBackPressed(); }\n}\n';
              fs.writeFileSync('webview-app/app/src/main/java/com/apkbot/app/MainActivity.java',java);
              fs.writeFileSync('webview-app/app/src/main/res/values/strings.xml','<?xml version=\x221.0\x22 encoding=\x22utf-8\x22?>\n<resources><string name=\x22app_name\x22>'+name+'</string></resources>\n');
            "
            cp -r "$HTML_DIR/." webview-app/app/src/main/assets/www/
            cd webview-app
            gradle wrapper && chmod +x gradlew
            ./gradlew assembleRelease --no-daemon 2>&1 | tail -50
            find . -name "*.apk" -exec cp {} $GITHUB_WORKSPACE/output.apk \;
          else
            echo "##[error]Struktur ZIP tidak dikenali!"
            echo "##[error]ZIP mode support:"
            echo "##[error]  - Projek Flutter (ada pubspec.yaml)"
            echo "##[error]  - Projek Android Studio (ada settings.gradle)"
            echo "##[error]  - React/web app (ada package.json + output build)"
            echo "##[error]  - Static HTML (ada index.html)"
            echo "##[error]Untuk website, gunakan MODE URL."
            find zip-project -type f ! -path "*/node_modules/*" | head -20
            exit 1
          fi

      - name: Verify & Upload APK
        run: |
          ls -lh output.apk || (echo "No APK produced!" && exit 1)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk-output
          path: output.apk
          retention-days: 1
